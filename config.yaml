project:
  name: local-md-rag

sources:
  - path: /home/neo/project/notes/investment/wiki/
    domain: stock
  - path: /home/neo/project/notes/learning/wiki/
    domain: study
exclude_names: [log.md]
exclude_dirs: [templates]

paths:
  chroma_dir: data/chroma
  processed_dir: data/processed
  metadata_db: data/metadata.sqlite
  eval_queries: eval/queries.wiki.yaml

embedding:
  provider: sentence_transformers
  # BAAI/bge-small-zh-v1.5 的本地副本(国内 HF 客户端下载不稳,改走本地目录)
  model_name: models/bge-small-zh-v1.5
  # bge-*-zh-v1.5 非对称检索:query 加指令前缀,passage 不加。留空即关闭。
  query_instruction: "为这个句子生成表示以用于检索相关文章："

chunking:
  target_chars: 800 # chunk 切多大（输出内容的实际长度）
  max_chars: 1200
  min_chars: 200
  overlap_chars: 100

search:
  top_k: 5
  preview_chars: 500 # 展示时预览截多少（只影响显示）
  min_score: 0.0
  relative_score_ratio: 0.7
  keyword_top_k: 20

reranker:
  enabled: false                       # 默认关、可回退;开则全文重排 +25pp(55%→80%)但单 query CPU ~28s
  model_name: models/bge-reranker-v2-m3
  candidate_k: 30                      # 诊断:期望页埋在 21~27 名,重排窗口必须够深
  # 提速杠杆(默认不启用):max_passage_chars: 256 # reranker 打分时读多少（只影响排序，不影响输出）可把 28s→7s,代价命中率 80%→75%
